<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<!-- Metastore -->
<rect x="258" y="26" width="164" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="340" y="48" text-anchor="middle" dominant-baseline="central">Metastore</text>

<!-- Users -->
<circle cx="60" cy="176" r="13" fill="none" stroke="#888780" stroke-width="1.5"/>
<path d="M38,203 Q60,192 82,203" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
<text font-size="12" fill="#5F5E5A" x="60" y="220" text-anchor="middle" dominant-baseline="central">Users</text>

<!-- API Server -->
<rect x="204" y="155" width="176" height="44" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#0C447C" x="292" y="177" text-anchor="middle" dominant-baseline="central">API server</text>

<!-- Execution zone container -->
<rect x="432" y="99" width="210" height="192" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 3"/>
<text font-size="12" fill="#888780" x="537" y="91" text-anchor="middle" dominant-baseline="central">execution zone</text>

<!-- Triggerer -->
<rect x="446" y="118" width="180" height="44" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="536" y="140" text-anchor="middle" dominant-baseline="central">Triggerer</text>

<!-- Workers shadow layers -->
<rect x="458" y="213" width="168" height="52" rx="8" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
<rect x="455" y="210" width="168" height="52" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<rect x="452" y="207" width="168" height="52" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#085041" x="536" y="233" text-anchor="middle" dominant-baseline="central">Workers</text>

<!-- DAG Processor -->
<rect x="108" y="320" width="148" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="182" y="342" text-anchor="middle" dominant-baseline="central">DAG processor</text>

<!-- Scheduler -->
<rect x="278" y="320" width="130" height="44" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#3C3489" x="343" y="342" text-anchor="middle" dominant-baseline="central">Scheduler</text>

<!-- Queue -->
<rect x="452" y="320" width="90" height="44" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#633806" x="497" y="342" text-anchor="middle" dominant-baseline="central">Queue</text>

<!-- DAG Folder -->
<rect x="108" y="420" width="122" height="44" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#2C2C2A" x="169" y="442" text-anchor="middle" dominant-baseline="central">DAG folder</text>

<!-- DAG Files -->
<rect x="72" y="500" width="68" height="60" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-size="12" fill="#5F5E5A" x="106" y="528" text-anchor="middle" dominant-baseline="central">dag_1.py</text>
<rect x="152" y="500" width="68" height="60" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-size="12" fill="#5F5E5A" x="186" y="528" text-anchor="middle" dominant-baseline="central">dag_2.py</text>
<rect x="232" y="500" width="68" height="60" rx="4" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text font-size="12" fill="#5F5E5A" x="266" y="528" text-anchor="middle" dominant-baseline="central">dag_3.py</text>

<!-- Remote node container -->
<rect x="432" y="380" width="230" height="130" rx="14" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3"/>
<text font-size="12" fill="#888780" x="547" y="373" text-anchor="middle" dominant-baseline="central">remote node</text>

<!-- RemSvc -->
<rect x="450" y="402" width="194" height="52" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
<text font-size="14" font-weight="500" fill="#712B13" x="547" y="422" text-anchor="middle" dominant-baseline="central">RemSvc</text>
<text font-size="12" fill="#993C1D" x="547" y="440" text-anchor="middle" dominant-baseline="central">gRPC :50051</text>
<text font-size="12" fill="#888780" x="547" y="476" text-anchor="middle" dominant-baseline="central">C++ execution engine</text>

<!-- ====== ARROWS ====== -->

<!-- Users → API Server -->
<line x1="82" y1="177" x2="204" y2="177" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="143" y="168" text-anchor="middle">monitor</text>

<!-- API Server → Metastore -->
<path d="M305,155 L305,100 L332,100 L332,70" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Metastore → API Server -->
<path d="M350,70 L350,100 L372,100 L372,155" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="340" y="87" text-anchor="middle">store / retrieve</text>

<!-- Execution zone → API Server -->
<line x1="432" y1="177" x2="380" y2="177" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="406" y="168" text-anchor="middle">task state</text>

<!-- API Server → DAG Processor -->
<path d="M243,199 L243,278 L182,278 L182,320" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- API Server → Scheduler -->
<line x1="342" y1="199" x2="342" y2="320" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Scheduler → Queue -->
<line x1="408" y1="342" x2="452" y2="342" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="430" y="334" text-anchor="middle">schedule</text>

<!-- Queue → Workers -->
<line x1="497" y1="320" x2="497" y2="291" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- DAG Folder → DAG Processor -->
<line x1="169" y1="420" x2="169" y2="364" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Users → DAG Folder -->
<path d="M60,203 L60,442 L108,442" fill="none" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text font-size="12" fill="#888780" x="72" y="340" text-anchor="start">write DAGs</text>

<!-- DAG Folder → Files -->
<path d="M169,464 L169,480 L106,480 L106,500" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 2"/>
<path d="M169,464 L169,480 L186,480 L186,500" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 2"/>
<path d="M169,464 L169,480 L266,480 L266,500" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 2"/>
<text font-size="12" fill="#888780" x="186" y="578" text-anchor="middle">DAG pipeline files</text>

<!-- Triggerer → RemSvc gRPC -->
<path d="M536,162 L536,310 L547,310 L547,402" fill="none" stroke="#D85A30" stroke-width="1.5" stroke-dasharray="7 4" marker-end="url(#arrow)"/>
<text font-size="12" fill="#D85A30" x="590" y="306" text-anchor="start">gRPC</text>
<text font-size="12" fill="#D85A30" x="590" y="320" text-anchor="start">trigger</text>
</svg>
